# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#
---
include:
  - board: nice_nano_v2
    shield: sofle_left nice_oled
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: nice_nano_v2
    shield: sofle_right nice_oled
  - board: nice_nano_v2
    shield: settings_reset
  # Depuracion: logs USB + rojo fijo al arrancar + registros SPIM3.
  - board: nice_nano_v2
    shield: sofle_left nice_oled
    snippet: zmk-usb-logging
    artifact-name: sofle_left_usb_logging
  # Depuracion: logs USB de la mitad DERECHA (split peripheral).
  - board: nice_nano_v2
    shield: sofle_right nice_oled
    snippet: zmk-usb-logging
    artifact-name: sofle_right_usb_logging

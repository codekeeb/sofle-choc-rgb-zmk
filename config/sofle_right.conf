# OLED de la mitad derecha (periferico):
# - Bateria VISUAL: el cristal "Smart Battery" (el obelisco giratorio de
#   siempre, pero reflejando el nivel de carga) en vez del gato.
# - El numero de porcentaje se saca fuera del lienzo (X=200 > 68 px de
#   ancho): la carga ya se ve en el cristal.
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SMART_BATTERY=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=n
CONFIG_NICE_OLED_WIDGET_BATTERY_CUSTOM_X=200

manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: mctechnology17
      url-base: https://github.com/mctechnology17
    - name: codekeeb
      url-base: https://github.com/codekeeb
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: v0.3
      import: app/west.yml
    # Override the Zephyr that ZMK imports: the v3.5.0+zmk-fixes branch got
    # a Nordic HAL bump on 2025-05-26 that breaks WS2812 output over SPIM on
    # this keyboard (LEDs dark with "correct" SPI data). It is pinned to the
    # branch state the working firmware was built against (Feb 2025). Same
    # import/blocklist as ZMK's app/west.yml.
    - name: zephyr
      remote: zmkfirmware
      revision: 0fa4cc26d8b1e5243570ccc0f7f66c4c428d2961
      clone-depth: 1
      import:
        name-blocklist:
          - ci-tools
          - hal_altera
          - hal_cypress
          - hal_infineon
          - hal_microchip
          - hal_nxp
          - hal_openisa
          - hal_silabs
          - hal_xtensa
          - hal_st
          - hal_ti
          - loramac-node
          - mcuboot
          - mcumgr
          - net-tools
          - openthread
          - edtt
          - trusted-firmware-m
    # Fork with runtime animation selection (behavior &oledanim)
    - name: zmk-nice-oled
      remote: codekeeb
      revision: selectable
  self:
    path: config
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
# Disable built-in widgets to avoid conflicts
# CONFIG_ZMK_WIDGET_LAYER_STATUS is not set
# CONFIG_ZMK_WIDGET_BATTERY_STATUS is not set
# CONFIG_ZMK_WIDGET_OUTPUT_STATUS is not set
# CONFIG_ZMK_WIDGET_WPM_STATUS is not set
# CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE is not set

# Encoder support
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Mouse scroll (&msc): smooth line-by-line scrolling on the base layer's
# right encoder, replacing the old 20-PG_UP/DN-per-detent macro (too
# abrupt -- jumped 20 pages per notch).
# NOTE: CONFIG_ZMK_MOUSE is a deprecated alias for CONFIG_ZMK_POINTING in
# ZMK >= v0.3; use the real option directly to avoid it silently no-op'ing.
CONFIG_ZMK_POINTING=y

# Additional options
CONFIG_ZMK_SLEEP=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# ZMK v0.3 cambio el default de y->n (por clones sin inductor HV). Sin el
# high-voltage DCDC, VCC comes from the internal LDO and cannot power the
# 30 LEDs: they stay dark even though SPI data arrives fine.
CONFIG_BOARD_ENABLE_DCDC_HV=y

# RGB FX (replaces ZMK's stock underglow, which only has 4 effects).
# El underglow activaba SPI/LED_STRIP; ahora hay que activarlos a mano.
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_SPI=y
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_FX=y
# Peripheral OLED animations switchable at runtime (&oledanim,
# fork codekeeb/zmk-nice-oled selectable branch). On both halves: the
# behavior tiene locality global.
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SELECTABLE=y
# Battery as a graphic icon with fill (instead of the % number), both OLEDs.
CONFIG_NICE_OLED_WIDGET_BATTERY_GRAPHIC=y

# RGB auto-off: after a minute idle the effects stop and the strip
# apaga; reviven con la primera pulsacion (gestionado en src/rgb_fx.c).
CONFIG_ZMK_IDLE_TIMEOUT=60000
